name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  quality:
    name: Type Check & Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  package:
    name: Package (${{ matrix.name }})
    needs: quality
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            command: pnpm build && pnpm exec electron-builder --mac --publish never
            artifact-name: Tanzo-macOS
            artifact-path: |
              dist/*.dmg
              dist/*.zip
              dist/*.blockmap
              dist/latest-mac.yml
          - name: Windows
            os: windows-latest
            command: pnpm build && pnpm exec electron-builder --win --publish never
            artifact-name: Tanzo-Windows
            artifact-path: |
              dist/*.exe
              dist/*.blockmap
              dist/latest.yml
          - name: Linux
            os: ubuntu-latest
            command: pnpm build && pnpm exec electron-builder --linux --publish never
            artifact-name: Tanzo-Linux
            artifact-path: |
              dist/*.AppImage
              dist/*.deb
              dist/*.snap
              dist/latest-linux.yml

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package application
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch annotated tag
        run: |
          git fetch --force --tags origin "+refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"

      - name: Extract tag annotation
        id: notes
        run: |
          object_type=$(git cat-file -t "${GITHUB_REF_NAME}")
          if [ "$object_type" = "tag" ]; then
            body=$(git for-each-ref --format='%(contents)' "refs/tags/${GITHUB_REF_NAME}")
          else
            body=$(git log -1 --pretty=%B "${GITHUB_REF_NAME}")
          fi
          {
            echo 'body<<TANZO_EOF'
            printf '%s\n' "$body"
            echo 'TANZO_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          files: dist/artifacts/**
          prerelease: ${{ contains(github.ref_name, '-') }}
