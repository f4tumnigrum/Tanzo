name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  quality:
    name: Type Check & Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  package:
    name: Package (${{ matrix.name }})
    needs: quality
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    # The Intel (x64) build needs a real x64 runner (macos-13) so its native
    # deps (@vscode/ripgrep, better-sqlite3) resolve to darwin-x64. Those
    # runners can queue for a long time; continue-on-error keeps a stuck/failed
    # x64 build from marking the whole workflow red. The release job (which uses
    # `if: always()`) still runs and ships the other platforms without it.
    continue-on-error: ${{ matrix.name == 'macOS (x64)' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (arm64)
            os: macos-latest
            command: pnpm build && pnpm exec electron-builder --mac --arm64 --publish never
            artifact-name: Tanzo-macOS-arm64
            artifact-path: |
              dist/*.dmg
              dist/*.zip
              dist/*.blockmap
              dist/latest-mac.yml
          - name: macOS (x64)
            os: macos-13
            command: pnpm build && pnpm exec electron-builder --mac --x64 --publish never
            artifact-name: Tanzo-macOS-x64
            artifact-path: |
              dist/*.dmg
              dist/*.zip
              dist/*.blockmap
              dist/latest-mac.yml
          - name: Windows
            os: windows-latest
            command: pnpm build && pnpm exec electron-builder --win --publish never
            artifact-name: Tanzo-Windows
            artifact-path: |
              dist/*.exe
              dist/*.blockmap
              dist/latest.yml
          - name: Linux
            os: ubuntu-latest
            command: pnpm build && pnpm exec electron-builder --linux --publish never
            artifact-name: Tanzo-Linux
            artifact-path: |
              dist/*.AppImage
              dist/*.deb
              dist/latest-linux.yml

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package application
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: GitHub Release
    needs: [quality, package]
    # Run even when the x64 package build fails (see continue-on-error above) so
    # the other platforms still ship, but only on tag pushes and only when the
    # required builds passed. Because the x64 branch is continue-on-error, the
    # aggregate `package` result stays `success` when only x64 fails; any other
    # required platform failing turns it to `failure` and blocks the release.
    if: >-
      ${{ always()
      && startsWith(github.ref, 'refs/tags/v')
      && needs.quality.result == 'success'
      && needs.package.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch annotated tag
        run: |
          git fetch --force --tags origin "+refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"

      - name: Extract tag annotation
        id: notes
        run: |
          object_type=$(git cat-file -t "${GITHUB_REF_NAME}")
          if [ "$object_type" = "tag" ]; then
            body=$(git for-each-ref --format='%(contents)' "refs/tags/${GITHUB_REF_NAME}")
          else
            body=$(git log -1 --pretty=%B "${GITHUB_REF_NAME}")
          fi
          {
            echo 'body<<TANZO_EOF'
            printf '%s\n' "$body"
            echo 'TANZO_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts

      - name: Collect release files and merge mac update manifests
        run: node scripts/collect-release-artifacts.mjs dist/artifacts dist/release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          files: dist/release/**
          prerelease: ${{ contains(github.ref_name, '-') }}
