name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Type Check & Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: |
          set +e
          pnpm test > test-out.txt 2>&1
          status=$?
          echo "=== TEST OUTPUT (exit $status) ==="
          cat test-out.txt
          if [ $status -ne 0 ]; then
            grep -nE 'FAIL|×|✗|Error:|AssertionError|Unhandled|rejection|Serialized Error|ELIFECYCLE|terminated' test-out.txt \
              | head -40 \
              | while IFS= read -r line; do
                  clean=$(printf '%s' "$line" | tr -d '\r' | sed 's/%/%25/g; s/\r/ /g')
                  echo "::error::$clean"
                done
          fi
          exit $status
